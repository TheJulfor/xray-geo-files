name: Build Custom Geo Files
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download Compilers and Clone Rules
        run: |
          # Скачиваем официальные легковесные компиляторы v2fly (они точно есть в релизах!)
          wget https://github.com/v2fly/geoip/releases/latest/download/geoip-linux-amd64
          wget https://github.com/v2fly/geosite/releases/latest/download/geosite-linux-amd64
          chmod +x geoip-linux-amd64 geosite-linux-amd64
          
          # Клонируем текстовые исходники правил от Loyalsoldier
          git clone --depth 1 https://github.com/Loyalsoldier/geoip.git source-geoip
          git clone --depth 1 https://github.com/Loyalsoldier/v2ray-rules-dat.git source-geosite

      - name: Filter and Compile Custom Geo Files
        run: |
          # 1. Готовим папки для сборки
          mkdir -p geoip-dir geosite-dir
          
          # 2. Копируем строго нужные текстовые списки IP
          cp source-geoip/text/ru.txt geoip-dir/
          cp source-geoip/text/private.txt geoip-dir/
          
          # 3. Копируем строго нужные текстовые списки сайтов из дата-папки Loyalsoldier
          cd source-geosite/data
          cp category-ru yandex mailru youtube discord telegram instagram tiktok category-ads-all win-spy ../../geosite-dir/
          cd ../../
          
          # 4. Компилируем текстовые файлы в финальные .dat базы
          ./geoip-linux-amd64 -input geoip-dir -output geoip.dat
          ./geosite-linux-amd64 -input geosite-dir -output geosite.dat

      - name: Release and Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Custom Geo Files
          files: |
            geosite.dat
            geoip.dat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
