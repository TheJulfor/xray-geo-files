name: Build Custom Geo Files
on:
  schedule:
    - cron: '0 0 * * *' # Автоматическое обновление каждую ночь
  workflow_dispatch: # Кнопка для ручного запуска

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download Tool and Source Files
        run: |
          # Скачиваем готовый скомпилированный бинарник утилиты hexband
          wget https://github.com/hexband/geosite-extract/releases/latest/download/geosite-extract-linux-amd64.tar.gz
          tar -xvf geosite-extract-linux-amd64.tar.gz
          chmod +x geosite-extract
          
          # Скачиваем оригинальные тяжелые базы
          wget -O source-geoip.dat https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat
          wget -O source-geosite.dat https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat

      - name: Extract Custom Geo Files
        run: |
          # Вырезаем Geosite (утилита создаст файл output.dat)
          ./geosite-extract -type geosite -shrink source-geosite.dat category-ru yandex mailru youtube discord telegram instagram tiktok category-ads-all win-spy
          mv output.dat geosite.dat
          
          # Вырезаем Geoip (утилита снова создаст файл output.dat)
          ./geosite-extract -type geoip -shrink source-geoip.dat ru private
          mv output.dat geoip.dat

      - name: Release and Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Custom Geo Files
          files: |
            geosite.dat
            geoip.dat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
